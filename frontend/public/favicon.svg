<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="grad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1e3a8a"/>
      <stop offset="100%" stop-color="#38bdf8"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="64" height="64" rx="14" fill="url(#grad)"/>

  <!-- Brain / AI node -->
  <circle cx="32" cy="24" r="10" fill="white" opacity="0.9"/>

  <!-- Graph line -->
  <polyline 
    points="16,42 26,34 36,40 48,28" 
    fill="none" 
    stroke="white" 
    stroke-width="3" 
    stroke-linecap="round" 
    stroke-linejoin="round"
  />

  <!-- Small nodes -->
  <circle cx="16" cy="42" r="2" fill="white"/>
  <circle cx="26" cy="34" r="2" fill="white"/>
  <circle cx="36" cy="40" r="2" fill="white"/>
  <circle cx="48" cy="28" r="2" fill="white"/>
</svg>